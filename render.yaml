# ============================================================
# Render Blueprint — deploys the backend in server/ as a Node web service.
#
# This file does NOT affect the frontend: Vercel keeps building and serving the
# static site from the repo root; Render only reads this file and only builds
# server/. Secrets (DATABASE_URL, GOOGLE_SCRIPT_URL) are set in the Render
# dashboard, never committed (sync: false).
#
# To use: Render → New → Blueprint → connect this repo. Render finds this file,
# creates the service, and asks you for the two secret values.
# ============================================================
services:
  - type: web
    name: m3m-brabus-api
    runtime: node
    rootDir: server # build & run inside server/, not the repo root
    plan: free
    region: singapore # closest to Gurgaon; change if you prefer
    # Install deps, generate the Prisma client, and apply the migration to Neon
    # (idempotent — safe to run on every deploy; creates the leads table once).
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true # redeploy on every push to the default branch
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEAD_STORE
        value: prisma
      # The live site origin(s) allowed to call the API (CORS). Accepts a
      # comma-separated list (e.g. "https://a.com,https://b.com") to allow more
      # than one origin. Update if the domain changes.
      - key: CORS_ORIGIN
        value: https://m3m-brabus.vercel.app
      # PORT is injected by Render automatically; the app reads process.env.PORT.
      # --- secrets: set these in the Render dashboard, not here ---
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_SCRIPT_URL
        sync: false
